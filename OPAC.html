<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library OPAC</title>
    <link rel="stylesheet" href="OPAC.css" />
  </head>
  <body>
    <header class="opac-header">
      <div class="page-shell opac-header-inner">
        <div>
          <p class="eyebrow">Online Public Access Catalog</p>
          <h1>Discover Your Next Read</h1>
          <p class="subhead">Explore recently added titles, highlighted shelves, and browseable collections from your local catalog.</p>
        </div>

        <form id="headerSearchForm" class="header-search" role="search" aria-label="Catalog search">
          <label class="sr-only" for="headerKeyword">Search the catalog</label>
          <input id="headerKeyword" type="search" placeholder="Search title, creator, subject, call number…" />
          <button type="submit">Search</button>
        </form>
      </div>
    </header>

    <main class="page-shell homepage-sections">
      <section aria-labelledby="recentlyAddedHeading" class="feature-block edge-anchor">
        <div class="section-heading-row">
          <h2 id="recentlyAddedHeading">Recently Added</h2>

          <div class="scroller-controls">
            <button id="browseAllRecent" class="ghost-link" type="button">Browse all new titles</button>
            <button class="scroll-btn" data-target="recentlyAddedScroller" data-dir="left" type="button" aria-label="Scroll recently added left">←</button>
            <button class="scroll-btn" data-target="recentlyAddedScroller" data-dir="right" type="button" aria-label="Scroll recently added right">→</button>
          </div>
        </div>

        <div id="recentlyAddedScroller" class="horizontal-scroller" aria-live="polite"></div>
      </section>

      <section aria-labelledby="curatedShelvesHeading" class="feature-block edge-anchor">
        <h2 id="curatedShelvesHeading">Curated Shelf Highlights</h2>
        <div id="curatedShelves" class="shelf-grid" aria-live="polite"></div>
      </section>

      <section aria-labelledby="browseByFormatHeading" class="feature-block edge-anchor">
        <h2 id="browseByFormatHeading">Browse by Format</h2>
        <div id="formatPills" class="pill-list" aria-live="polite"></div>
      </section>

    </main>

    <div id="searchModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="searchModalHeading" hidden>
      <div class="modal-card">
        <div class="modal-header">
          <h2 id="searchModalHeading">Search the Catalog</h2>
          <button id="closeSearchModal" class="icon-btn" type="button" aria-label="Close search">✕</button>
        </div>

        <section class="search-panel">
          <label>
            <span>Keyword</span>
            <input id="keyword" type="search" placeholder="Title, creator, subject, call number, or material number" />
          </label>

          <label>
            <span>Format</span>
            <select id="formatFilter">
              <option value="all">All formats</option>
            </select>
          </label>

          <label>
            <span>Availability</span>
            <select id="statusFilter">
              <option value="all">Any status</option>
              <option value="Available">Available</option>
              <option value="Checked In">Checked In</option>
              <option value="On Loan">On Loan</option>
              <option value="Reference Only">Reference Only</option>
            </select>
          </label>

          <label>
            <span>Sort</span>
            <select id="sortFilter">
              <option value="relevance">Relevance</option>
              <option value="newest">Newest year</option>
              <option value="oldest">Oldest year</option>
              <option value="title">Title A–Z</option>
            </select>
          </label>
        </section>

        <section id="results" class="results-grid" aria-live="polite"></section>
      </div>
    </div>

    <div id="recordModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="recordModalHeading" hidden>
      <div class="modal-card record-modal-card">
        <div class="modal-header">
          <h2 id="recordModalHeading">Record Details</h2>
          <button id="closeRecordModal" class="icon-btn" type="button" aria-label="Close record details">✕</button>
        </div>
        <section id="recordDetailBody" class="record-detail-body"></section>
      </div>
    </div>

    <div id="shelfModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="shelfModalHeading" hidden>
      <div class="modal-card">
        <div class="modal-header">
          <h2 id="shelfModalHeading">Curated Shelf</h2>
          <button id="closeShelfModal" class="icon-btn" type="button" aria-label="Close curated shelf">✕</button>
        </div>
        <section id="shelfModalBody" class="results-grid"></section>
      </div>
    </div>

    <template id="recordTemplate">
      <article class="card clickable-card" tabindex="0" role="button">
        <img class="card-cover" />
        <h3 class="card-title"></h3>
        <p class="card-meta"></p>
        <p class="card-line status"></p>
        <p class="card-line location"></p>
        <p class="card-line callnumber"></p>
        <p class="card-line subjects"></p>
      </article>
    </template>

    <template id="discoveryCardTemplate">
      <article class="mini-card clickable-card" tabindex="0" role="button">
        <img class="mini-cover" />
        <p class="mini-title"></p>
        <p class="mini-meta"></p>
      </article>
    </template>

    <script>
      const STORAGE_KEY_PRIMARY = "catalogRecordsV2";
      const STORAGE_KEY_LEGACY = "catalogRecords";
      const RECENTLY_VIEWED_KEY = "opacRecentlyViewed";
      const SETTINGS_KEY = "catalogSettingsV1";
      const PLACEHOLDER_COVER = "https://placehold.co/180x260?text=No+Cover";

      const els = {
        headerSearchForm: document.getElementById("headerSearchForm"),
        headerKeyword: document.getElementById("headerKeyword"),
        keyword: document.getElementById("keyword"),
        format: document.getElementById("formatFilter"),
        status: document.getElementById("statusFilter"),
        sort: document.getElementById("sortFilter"),
        results: document.getElementById("results"),
        recordTemplate: document.getElementById("recordTemplate"),
        discoveryCardTemplate: document.getElementById("discoveryCardTemplate"),
        modal: document.getElementById("searchModal"),
        closeModalBtn: document.getElementById("closeSearchModal"),
        recordModal: document.getElementById("recordModal"),
        closeRecordModalBtn: document.getElementById("closeRecordModal"),
        recordDetailBody: document.getElementById("recordDetailBody"),
        shelfModal: document.getElementById("shelfModal"),
        closeShelfModalBtn: document.getElementById("closeShelfModal"),
        shelfModalBody: document.getElementById("shelfModalBody"),
        shelfModalHeading: document.getElementById("shelfModalHeading"),
        recentlyAdded: document.getElementById("recentlyAddedScroller"),
        curatedShelves: document.getElementById("curatedShelves"),
        formatPills: document.getElementById("formatPills"),
        browseAllRecent: document.getElementById("browseAllRecent"),
      };

      const state = { records: [], recent: loadRecentRecords(), curatedShelves: [] };

      function loadIlsRecords() {
        const primaryRaw = localStorage.getItem(STORAGE_KEY_PRIMARY);
        const legacyRaw = localStorage.getItem(STORAGE_KEY_LEGACY);

        const tryParse = (raw) => {
          if (!raw) return [];
          try {
            const parsed = JSON.parse(raw);
            return Array.isArray(parsed) ? parsed : [];
          } catch {
            return [];
          }
        };

        const primary = tryParse(primaryRaw);
        const legacy = tryParse(legacyRaw);
        return (primary.length ? primary : legacy).map(normalize);
      }

      function normalize(record = {}) {
        return {
          id: record.id || `id-${Math.random().toString(16).slice(2)}`,
          title: String(record.title || "Untitled").trim(),
          creator: String(record.creator || "Unknown creator").trim(),
          format: String(record.format || "Other").trim(),
          year: record.year || "",
          status: String(record.status || "Available").trim(),
          location: String(record.location || "Location not specified").trim(),
          callNumber: String(record.callNumber || "").trim(),
          subjects: String(record.subjects || "").trim(),
          curatedShelf: String(record.curatedShelf || "").trim(),
          coverUrl: String(record.coverUrl || "").trim(),
          materialNumbers: Array.isArray(record.materialNumbers) ? record.materialNumbers : [],
          addedAt: Number(record.addedAt || 0),
        };
      }

      function openSearchModal(keyword = "") {
        els.keyword.value = keyword;
        els.modal.hidden = false;
        syncModalBodyState();
        renderSearchResults();
        els.keyword.focus();
      }

      function closeSearchModal() {
        els.modal.hidden = true;
        syncModalBodyState();
      }

      function openRecordModal(record) {
        els.recordModal.hidden = false;
        syncModalBodyState();
        renderRecordDetails(record);
        saveRecentRecord(record.id);
      }

      function closeRecordModal() {
        els.recordModal.hidden = true;
        syncModalBodyState();
      }

      function openShelfModal(shelfName) {
        const shelfRecords = state.records
          .filter((record) => record.curatedShelf === shelfName)
          .sort((a, b) => Number(b.addedAt || 0) - Number(a.addedAt || 0));
        els.shelfModalHeading.textContent = shelfName;
        els.shelfModalBody.innerHTML = "";
        if (!shelfRecords.length) {
          els.shelfModalBody.innerHTML = '<p class="empty">No records are currently assigned to this shelf.</p>';
        } else {
          const fragment = document.createDocumentFragment();
          shelfRecords.forEach((record) => fragment.append(createMiniCard(record)));
          els.shelfModalBody.append(fragment);
        }
        els.shelfModal.hidden = false;
        syncModalBodyState();
      }

      function closeShelfModal() {
        els.shelfModal.hidden = true;
        syncModalBodyState();
      }

      function syncModalBodyState() {
        const anyModalOpen = !els.modal.hidden || !els.recordModal.hidden || !els.shelfModal.hidden;
        document.body.classList.toggle("modal-open", anyModalOpen);
      }

      function loadRecentRecords() {
        try {
          const parsed = JSON.parse(localStorage.getItem(RECENTLY_VIEWED_KEY) || "[]");
          return Array.isArray(parsed) ? parsed.slice(0, 10) : [];
        } catch {
          return [];
        }
      }

      function saveRecentRecord(recordId) {
        state.recent = [recordId, ...state.recent.filter((id) => id !== recordId)].slice(0, 10);
        localStorage.setItem(RECENTLY_VIEWED_KEY, JSON.stringify(state.recent));
      }

      function populateFormatFilter(records) {
        const formats = [...new Set(records.map((r) => r.format).filter(Boolean))].sort((a, b) => a.localeCompare(b));
        const current = els.format.value;
        els.format.innerHTML = '<option value="all">All formats</option>';
        formats.forEach((format) => {
          const option = document.createElement("option");
          option.value = format;
          option.textContent = format;
          els.format.append(option);
        });
        if (formats.includes(current)) els.format.value = current;
      }

      function getFilteredRecords() {
        const keyword = els.keyword.value.trim().toLowerCase();
        const format = els.format.value;
        const status = els.status.value;
        const sort = els.sort.value;

        const filtered = state.records.filter((record) => {
          const haystack = `${record.title} ${record.creator} ${record.subjects} ${record.callNumber} ${record.materialNumbers.join(" ")}`.toLowerCase();
          const keywordMatch = !keyword || haystack.includes(keyword);
          const formatMatch = format === "all" || record.format === format;
          const statusMatch = status === "all" || record.status === status;
          return keywordMatch && formatMatch && statusMatch;
        });

        if (sort === "newest") filtered.sort((a, b) => Number(b.year || 0) - Number(a.year || 0));
        else if (sort === "oldest") filtered.sort((a, b) => Number(a.year || 0) - Number(b.year || 0));
        else if (sort === "title") filtered.sort((a, b) => a.title.localeCompare(b.title));
        else filtered.sort((a, b) => Number(b.addedAt || 0) - Number(a.addedAt || 0));

        return filtered;
      }

      function renderSearchResults() {
        const filtered = getFilteredRecords();
        els.results.innerHTML = "";

        if (!state.records.length) {
          const empty = document.createElement("p");
          empty.className = "empty";
          empty.textContent = "No records found in the ILS yet. Add records in ils.html, then refresh.";
          els.results.append(empty);
          return;
        }

        if (!filtered.length) {
          const empty = document.createElement("p");
          empty.className = "empty";
          empty.textContent = "No records match your filters.";
          els.results.append(empty);
          return;
        }

        const fragment = document.createDocumentFragment();

        filtered.forEach((record) => {
          const node = els.recordTemplate.content.firstElementChild.cloneNode(true);
          const cover = node.querySelector(".card-cover");
          cover.src = record.coverUrl || PLACEHOLDER_COVER;
          cover.loading = "lazy";
          cover.alt = `Cover for ${record.title}`;
          cover.onerror = () => {
            cover.src = PLACEHOLDER_COVER;
          };
          node.querySelector(".card-title").textContent = record.title;
          node.querySelector(".card-meta").textContent = `${record.creator} • ${record.format}${record.year ? ` • ${record.year}` : ""}`;
          node.querySelector(".status").textContent = `Status: ${record.status}`;
          node.querySelector(".location").textContent = `Location: ${record.location}`;
          node.querySelector(".callnumber").textContent = `Call #: ${record.callNumber || "Not assigned"}`;
          node.querySelector(".subjects").textContent = `Subjects: ${record.subjects || "Not provided"}`;
          node.addEventListener("click", () => openRecordModal(record));
          node.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              openRecordModal(record);
            }
          });
          fragment.append(node);
        });

        els.results.append(fragment);
      }

      function createMiniCard(record) {
        const card = els.discoveryCardTemplate.content.firstElementChild.cloneNode(true);
        const cover = card.querySelector(".mini-cover");
        cover.src = record.coverUrl || PLACEHOLDER_COVER;
        cover.alt = `Cover for ${record.title}`;
        cover.loading = "lazy";
        cover.onerror = () => {
          cover.src = PLACEHOLDER_COVER;
        };
        card.querySelector(".mini-title").textContent = record.title;
        card.querySelector(".mini-meta").textContent = `${record.creator} • ${record.format}${record.year ? ` • ${record.year}` : ""}`;
        card.addEventListener("click", () => openRecordModal(record));
        card.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openRecordModal(record);
          }
        });
        return card;
      }

      function renderRecordDetails(record) {
        const recentMatches = state.recent
          .map((id) => state.records.find((r) => r.id === id))
          .filter(Boolean)
          .filter((r) => r.id !== record.id)
          .slice(0, 4);
        const related = state.records
          .filter((r) => r.id !== record.id && (r.creator === record.creator || r.format === record.format || r.subjects === record.subjects))
          .slice(0, 6);

        els.recordDetailBody.innerHTML = `
          <article class="record-profile">
            <img src="${record.coverUrl || PLACEHOLDER_COVER}" class="detail-cover" alt="Cover for ${record.title}" />
            <div>
              <h3>${record.title}</h3>
              <p class="detail-meta">${record.creator} • ${record.format}${record.year ? ` • ${record.year}` : ""}</p>
              <p class="detail-line"><strong>Status:</strong> ${record.status}</p>
              <p class="detail-line"><strong>Location:</strong> ${record.location}</p>
              <p class="detail-line"><strong>Call Number:</strong> ${record.callNumber || "Not assigned"}</p>
              <p class="detail-line"><strong>Subjects:</strong> ${record.subjects || "Not provided"}</p>
              <div class="record-actions">
                <button id="placeHoldBtn" type="button">Place Hold</button>
                <button id="copyLinkBtn" type="button">Copy Link</button>
              </div>
              <p id="recordActionNotice" class="detail-notice" aria-live="polite"></p>
            </div>
          </article>
          <section>
            <h4>You might also like</h4>
            <div class="detail-chip-list">${related.length ? related.map((r) => `<button class="detail-chip" data-related-id="${r.id}" type="button">${r.title}</button>`).join("") : "<p class='empty'>No related titles available.</p>"}</div>
          </section>
          <section>
            <h4>Recently viewed</h4>
            <div class="detail-chip-list">${recentMatches.length ? recentMatches.map((r) => `<button class="detail-chip" data-related-id="${r.id}" type="button">${r.title}</button>`).join("") : "<p class='empty'>No recent records yet.</p>"}</div>
          </section>
        `;

        const detailCover = els.recordDetailBody.querySelector(".detail-cover");
        detailCover.onerror = () => {
          detailCover.src = PLACEHOLDER_COVER;
        };
        els.recordDetailBody.querySelector("#placeHoldBtn").addEventListener("click", () => {
          els.recordDetailBody.querySelector("#recordActionNotice").textContent = "Hold request placed. You would receive a pickup notice in a real OPAC workflow.";
        });
        els.recordDetailBody.querySelector("#copyLinkBtn").addEventListener("click", async () => {
          const url = `${location.origin}${location.pathname}#record=${encodeURIComponent(record.id)}`;
          try {
            await navigator.clipboard.writeText(url);
            els.recordDetailBody.querySelector("#recordActionNotice").textContent = "Record link copied to clipboard.";
          } catch {
            els.recordDetailBody.querySelector("#recordActionNotice").textContent = "Copy failed. You can copy the URL manually.";
          }
        });
        els.recordDetailBody.querySelectorAll("[data-related-id]").forEach((button) => {
          button.addEventListener("click", () => {
            const relatedRecord = state.records.find((r) => r.id === button.dataset.relatedId);
            if (relatedRecord) openRecordModal(relatedRecord);
          });
        });
      }
      function loadCuratedShelfNames() {
        try {
          const parsed = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
          return Array.isArray(parsed.curatedShelves) ? parsed.curatedShelves : [];
        } catch {
          return [];
        }
      }

      function renderDiscovery() {
        els.recentlyAdded.innerHTML = "";
        els.curatedShelves.innerHTML = "";
        els.formatPills.innerHTML = "";

        if (!state.records.length) {
          els.recentlyAdded.innerHTML = '<p class="empty">No recently added titles yet.</p>';
          els.curatedShelves.innerHTML = '<p class="empty">No shelves to highlight yet.</p>';
          return;
        }

        const newest = [...state.records].sort((a, b) => Number(b.addedAt || 0) - Number(a.addedAt || 0)).slice(0, 18);
        newest.forEach((record) => els.recentlyAdded.append(createMiniCard(record)));

        const shelfMap = state.records.reduce((acc, record) => {
          if (!record.curatedShelf) return acc;
          (acc[record.curatedShelf] ||= []).push(record);
          return acc;
        }, {});
        const shelfNames = [...new Set([...(state.curatedShelves || []), ...Object.keys(shelfMap)])].sort((a, b) => a.localeCompare(b));
        if (!shelfNames.length) {
          els.curatedShelves.innerHTML = '<p class="empty">No shelves to highlight yet.</p>';
        }

        shelfNames.forEach((shelfName) => {
          const records = (shelfMap[shelfName] || []).sort((a, b) => Number(b.addedAt || 0) - Number(a.addedAt || 0));
          const container = document.createElement("article");
          container.className = "shelf-card";
          container.setAttribute("role", "button");
          container.setAttribute("tabindex", "0");
          container.innerHTML = `<h3>${shelfName}</h3>`;

          records.slice(0, 3).forEach((record) => {
            const row = document.createElement("p");
            row.className = "shelf-item";
            row.textContent = `${record.title} — ${record.creator}`;
            container.append(row);
          });
          if (!records.length) {
            const row = document.createElement("p");
            row.className = "shelf-item";
            row.textContent = "No titles assigned yet.";
            container.append(row);
          }

          const count = document.createElement("p");
          count.className = "shelf-count";
          count.textContent = `${records.length} title${records.length === 1 ? "" : "s"}`;
          container.append(count);

          container.addEventListener("click", () => openShelfModal(shelfName));
          container.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              openShelfModal(shelfName);
            }
          });
          els.curatedShelves.append(container);
        });

        const formatCounts = state.records.reduce((acc, record) => {
          acc[record.format] = (acc[record.format] || 0) + 1;
          return acc;
        }, {});

        Object.entries(formatCounts)
          .sort((a, b) => b[1] - a[1])
          .forEach(([format, count]) => {
            const pill = document.createElement("button");
            pill.type = "button";
            pill.className = "format-pill";
            pill.textContent = `${format} (${count})`;
            pill.addEventListener("click", () => {
              els.format.value = format;
              openSearchModal();
            });
            els.formatPills.append(pill);
          });

        setupScrollerButtons();
      }

      function setupScrollerButtons() {
        document.querySelectorAll(".scroll-btn").forEach((btn) => {
          btn.onclick = () => {
            const targetId = btn.dataset.target;
            const direction = btn.dataset.dir === "right" ? 1 : -1;
            const scroller = document.getElementById(targetId);
            if (!scroller) return;

            const firstCard = scroller.querySelector(".mini-card");
            if (!firstCard) return;

            const styles = getComputedStyle(scroller);
            const gap = parseFloat(styles.columnGap || styles.gap || 0);
            const scrollAmount = (firstCard.offsetWidth + gap) * 6;

            scroller.scrollBy({
              left: scrollAmount * direction,
              behavior: "smooth"
            });
          };
        });
      }

      function reloadFromIls() {
        state.records = loadIlsRecords();
        state.curatedShelves = loadCuratedShelfNames();
        populateFormatFilter(state.records);
        renderDiscovery();
        renderSearchResults();
        openRecordFromHash();
      }

      function openRecordFromHash() {
        const match = location.hash.match(/record=([^&]+)/);
        if (!match) return;
        const id = decodeURIComponent(match[1]);
        const record = state.records.find((item) => item.id === id);
        if (record) openRecordModal(record);
      }

      [els.keyword, els.format, els.status, els.sort].forEach((element) => element.addEventListener("input", renderSearchResults));
      els.closeModalBtn.addEventListener("click", closeSearchModal);
      els.closeRecordModalBtn.addEventListener("click", closeRecordModal);
      els.closeShelfModalBtn.addEventListener("click", closeShelfModal);

      els.modal.addEventListener("click", (event) => {
        if (event.target === els.modal) closeSearchModal();
      });

      els.recordModal.addEventListener("click", (event) => {
        if (event.target === els.recordModal) closeRecordModal();
      });

      els.shelfModal.addEventListener("click", (event) => {
        if (event.target === els.shelfModal) closeShelfModal();
      });

      els.headerSearchForm.addEventListener("submit", (event) => {
        event.preventDefault();
        openSearchModal(els.headerKeyword.value.trim());
      });

      if (els.browseAllRecent) {
        els.browseAllRecent.addEventListener("click", () => {
          els.sort.value = "newest";
          els.status.value = "all";
          els.format.value = "all";
          openSearchModal();
        });
      }

      window.addEventListener("storage", reloadFromIls);
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !els.modal.hidden) closeSearchModal();
        if (event.key === "Escape" && !els.recordModal.hidden) closeRecordModal();
        if (event.key === "Escape" && !els.shelfModal.hidden) closeShelfModal();
      });

      reloadFromIls();
    </script>
  </body>
</html>
