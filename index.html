<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Library Catalog</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <h1>My Personal Catalog</h1>
        <p>Browse books, vinyl, board games, and more.</p>
      </div>
      <button id="adminToggleBtn" class="button">Admin Login</button>
    </header>

    <main>
      <section id="opacSection" class="card">
        <h2>Public Catalog (OPAC)</h2>
        <section class="arrivals" aria-labelledby="arrivalsTitle">
          <div class="arrivals-header">
            <h3 id="arrivalsTitle">New Arrivals</h3>
            <div class="arrivals-controls">
              <button id="arrivalsPrevBtn" class="button button-secondary" type="button" aria-label="Scroll new arrivals left">←</button>
              <button id="arrivalsNextBtn" class="button button-secondary" type="button" aria-label="Scroll new arrivals right">→</button>
            </div>
          </div>
          <div id="newArrivals" class="cover-scroller" role="list"></div>
        </section>
        <div class="toolbar">
          <input id="searchInput" type="search" placeholder="Search title, creator, genre..." />
          <select id="formatFilter">
            <option value="all">All Formats</option>
            <option value="Book">Book</option>
            <option value="Vinyl">Vinyl</option>
            <option value="Board Game">Board Game</option>
            <option value="Other">Other</option>
          </select>
          <select id="sortFilter" aria-label="Sort records">
            <option value="newest">Newest first</option>
            <option value="title">Title A-Z</option>
            <option value="yearDesc">Year (newest)</option>
            <option value="yearAsc">Year (oldest)</option>
          </select>
        </div>
        <p id="resultsSummary" class="results-summary"></p>
        <div id="publicResults" class="grid"></div>
      </section>

      <section id="adminSection" class="card hidden">
        <h2>Catalog Admin</h2>
        <p class="muted">Use this area to add or edit items in your collection.</p>

        <form id="recordForm" class="form-grid">
          <input id="recordId" type="hidden" />

          <label>
            Title
            <input id="title" required />
          </label>

          <label>
            Creator / Author / Artist
            <input id="creator" required />
          </label>

          <label>
            Format
            <select id="format" required>
              <option value="Book">Book</option>
              <option value="Vinyl">Vinyl</option>
              <option value="Board Game">Board Game</option>
              <option value="Other">Other</option>
            </select>
          </label>

          <label>
            Year
            <input id="year" type="number" min="0" step="1" />
          </label>

          <label>
            Genre / Category
            <select id="genre"></select>
          </label>

          <label>
            Publisher
            <input id="publisher" />
          </label>

          <label>
            Location
            <input id="location" placeholder="Shelf, room, bin, etc." />
          </label>

          <label>
            Cover Image URL
            <input id="coverUrl" type="url" placeholder="https://..." />
          </label>

          <label class="full-width">
            Notes
            <textarea id="notes" rows="3"></textarea>
          </label>

          <div class="actions full-width">
            <button class="button" type="submit">Save Record</button>
            <button class="button button-secondary" id="cancelEditBtn" type="button">Cancel Edit</button>
          </div>
        </form>

        <h3>Collection Records</h3>
        <div id="adminResults" class="grid"></div>
      </section>
    </main>

    <div id="loginModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
      <form id="loginForm" class="modal-content">
        <h3 id="loginTitle">Admin Login</h3>
        <p class="muted">Temporary coded login until Firebase auth is added.</p>

        <label>
          Username
          <input id="username" required />
        </label>

        <label>
          Password
          <input id="password" type="password" required />
        </label>

        <p id="loginError" class="error" aria-live="polite"></p>

        <menu>
          <button class="button" value="cancel" type="button" id="closeLoginBtn">Cancel</button>
          <button class="button" value="default" type="submit">Login</button>
        </menu>
      </form>
    </div>

    <div id="recordDetailsModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="recordDetailsTitle">
      <div class="modal-content record-details-content">
        <div class="record-details-header">
          <h3 id="recordDetailsTitle">Record Details</h3>
          <button class="button button-secondary" id="closeRecordDetailsBtn" type="button">Close</button>
        </div>
        <p id="recordDetailsMeta" class="record-meta"></p>
        <p id="recordDetailsPublisher" class="record-meta"></p>
        <p id="recordDetailsLocation" class="record-meta"></p>
        <h4>Notes</h4>
        <p id="recordDetailsNotes" class="record-notes"></p>
      </div>
    </div>

    <template id="recordTemplate">
      <article class="record-card">
        <img class="cover" alt="" loading="lazy" />
        <div>
          <h4 class="record-title"></h4>
          <p class="record-meta"></p>
          <button class="button button-secondary view-details-btn" type="button">View Details</button>
          <div class="record-actions hidden"></div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
